services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rails-public-api-web
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: db
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    command: bash -lc "bundle install && bin/rails db:prepare && bin/rails server -b 0.0.0.0 -p 3001"

  db:
    image: postgres:16
    container_name: rails-public-api-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rails_public_api_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bundle_data:
  postgres_data:
