services:
  db:
    image: postgres:16
    container_name: rails-public-api-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rails_public_api_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rails_public_api_development"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
